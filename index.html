<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仏具シミュレーター プロトタイプ</title>
    <style>
        /* 全体のレイアウト */
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
            padding: 20px;
        }

        /* 画像を重ねるコンテナ */
        .stage {
            position: relative;
            width: 600px; /* 仏壇のサイズに合わせて調整 */
            height: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            background-color: #fff;
        }

        /* 仏壇（背景） */
        .base-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* 仏具（パーツ） */
        .item-img {
            position: absolute;
            /* 置く位置の調整用：仏壇の棚の上にくるように調整 */
            bottom: 22%; 
            left: 50%;
            transform: translateX(-50%);
            width: 120px; /* 具足の大きさを調整 */
            transition: opacity 0.3s ease; /* 切り替えを少し滑らかに */
            display: none;
            z-index: 10;
        }

        /* 表示中のクラス */
        .active {
            display: block;
        }

        /* ボタン周り */
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 12px 24px;
            cursor: pointer;
            background-color: #fff;
            border: 2px solid #8d6e63;
            color: #8d6e63;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #8d6e63;
            color: #fff;
        }

        .title {
            margin-bottom: 20px;
            color: #5d4037;
        }
    </style>
</head>
<body>

    <h2 class="title">仏具シミュレーター</h2>

    <div class="stage">
        <img src="butsu.jpg" alt="仏壇" class="base-img">

        <img src="11.png" id="item1" class="item-img active">
        <img src="22.png" id="item2" class="item-img">
    </div>

    <div class="controls">
        <button onclick="changeItem('item1')">麻の葉（白）</button>
        <button onclick="changeItem('item2')">七宝（ピンク）</button>
    </div>

    <script>
        function changeItem(id) {
            // 全てのアイテムを非表示にする
            const items = document.querySelectorAll('.item-img');
            items.forEach(item => {
                item.classList.remove('active');
            });

            // クリックされたIDのアイテムだけ表示する
            const selected = document.getElementById(id);
            if (selected) {
                selected.classList.add('active');
            }
        }
    </script>

</body>
</html>
